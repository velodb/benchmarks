# VeloDB SSB Update MoR SF100 (100%) Benchmark Configuration

# Engine connection information
engine:
  type: "velodb"
  connection:
    fe_host: "${FE_HOST:-127.0.0.1}"
    fe_http_port: "${FE_HTTP_PORT:-8030}"
    fe_query_port: "${FE_QUERY_PORT:-9030}"
    user: "${DB_USER:-root}"
    password: "${PASSWORD:-}"
    db: "${DB:-ssb}"
    be_hosts: "${BE_HOSTS:-}"
    be_http_port: "${BE_HTTP_PORT:-8040}"
    be_brpc_port: "${BE_BRPC_PORT:-8060}"

# Benchmark parameters
parameters:
  load: "${LOAD:-false}"
  query: "${QUERY:-false}"
  query_times: "${QUERY_TIMES:-3}"
  cold_query_count: "${COLD_QUERY_COUNT:-1}"
  hot_query_count: "${HOT_QUERY_COUNT:-2}"
  clear_file_cache: "${CLEAR_FILE_CACHE:-false}"
  clear_page_cache: "${CLEAR_PAGE_CACHE:-false}"
  clear_sys_page_cache: "${CLEAR_SYS_PAGE_CACHE:-false}"
  clear_cache_scope: "${CLEAR_CACHE_SCOPE:-before_query}"
  clear_file_cache_max_size_gb: "${CLEAR_FILE_CACHE_MAX_SIZE_GB:-2}"
  clear_file_cache_timeout_min: "${CLEAR_FILE_CACHE_TIMEOUT_MIN:-60}"
  clear_sys_page_cache_method: "${CLEAR_SYS_PAGE_CACHE_METHOD:-ssh}"
  clear_sys_page_cache_http_port: "${CLEAR_SYS_PAGE_CACHE_HTTP_PORT:-8050}"
  clear_sys_page_cache_http_path: "${CLEAR_SYS_PAGE_CACHE_HTTP_PATH:-/drop_sys_cache}"
  clear_cache_ssh_user: "${CLEAR_CACHE_SSH_USER:-root}"

# Test resource paths (relative to this YAML file)
paths:
  ddl: "ddl/ddl.sql"
  load_dir: "load/"
  query_dir: "${QUERY_DIR:-query/}" # Directory containing query SQL files
  query_mode: "line"
storage:
  endpoint: "${STORAGE_ENDPOINT:-https://s3.us-east-1.amazonaws.com}"
  region: "${STORAGE_REGION:-us-east-1}"
  bucket: "${STORAGE_BUCKET:-bench-dataset}"
  access_key: "${STORAGE_ACCESS_KEY:-xxx}"
  secret_key: "${STORAGE_SECRET_KEY:-xxx}"
