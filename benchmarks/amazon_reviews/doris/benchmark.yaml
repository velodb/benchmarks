# Amazon Reviews Benchmark Configuration (Baseline - No Inverted Index)
# Tests query performance without inverted indexes

# Engine connection information
engine:
  type: "doris"
  connection:
    fe_host: "${FE_HOST:-127.0.0.1}"
    fe_http_port: "${FE_HTTP_PORT:-8030}"
    fe_query_port: "${FE_QUERY_PORT:-9030}"
    user: "${USER:-admin}"
    password: "${PASSWORD:-}"
    db: "${DB:-amazon_reviews}"

# Test execution parameters
parameters:
  load: "${LOAD:-true}"
  query: "${QUERY:-true}"
  session: "${SESSION:-true}"
  analyze: "${ANALYZE:-true}"
  query_times: "${QUERY_TIMES:-3}"
  jmeter: "${JMETER:-true}"
  threads: "${JMETER_THREADS:-50}"
  loops: "${JMETER_LOOPS:-1}"
  duration: "${JMETER_DURATION:-180}"
  query_by_query: "${QUERY_BY_QUERY:-true}"

# Test resource paths
paths:
  ddl: "ddl/ddl.sql"
  session_file: "${SESSION_FILE:-session/session.sql}"
  analyze_file: "${ANALYZE_FILE:-analyze/analyze.sql}"
  load_dir: "load/"
  query_dir: "${QUERY_DIR:-query/}" # Directory containing query SQL files
  query_mode: "line"
storage:
  endpoint: "${STORAGE_ENDPOINT:-https://s3.us-east-1.amazonaws.com}"
  region: "${STORAGE_REGION:-us-east-1}"
  bucket: "${STORAGE_BUCKET:-bench-dataset}"
